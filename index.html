<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0e1a">
    <title>Super Ball: Neon City</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ffff">
    <meta property="og:title" content="Super Ball: Neon City">
    <meta property="og:description" content="A fast-paced neon arcade game built with HTML, CSS, and JavaScript.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="assets/icons/icon-512.png">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Super Ball: Neon City">
    <meta name="twitter:description" content="Collect coins, avoid obstacles, and survive in Neon City!">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/icon-192.png">
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icons/icon-512.png">
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="bg-particles">
        <div class="particle-orb" style="width: 250px; height: 250px; background: #8b5cf6; top: 10%; left: 10%;"></div>
        <div class="particle-orb" style="width: 200px; height: 200px; background: #06b6d4; top: 60%; right: 10%; animation-delay: -7s;"></div>
        <div class="particle-orb" style="width: 180px; height: 180px; background: #ec4899; bottom: 10%; left: 30%; animation-delay: -14s;"></div>
    </div>
    
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <div class="ui-layer">
        <div class="flex justify-between items-start w-full z-20 hidden" id="hud">
            <div class="flex gap-2 flex-wrap">
                <button id="exitBtn" class="interactive-ui px-3 py-2 bg-red-500/10 text-red-400 border border-red-500/40 rounded-lg text-xs font-bold" style="font-family: 'Orbitron', sans-serif; min-height: 36px;">EXIT</button>
                <div class="text-white text-sm md:text-lg font-bold bg-gray-900/80 px-3 py-2 rounded-lg border border-blue-500/30 flex items-center gap-1">
                    <span class="text-green-400">$</span><span id="scoreDisplay" class="text-green-400">0</span>
                </div>
            </div>
            <div class="bg-gray-900/80 px-3 py-2 rounded-lg border border-red-500/30 flex items-center gap-1" id="livesContainer"></div>
        </div>

        <div class="mobile-controls w-full justify-between items-end pb-4 z-20 interactive-ui" id="mobileControls">
            <div class="flex gap-3">
                <div id="btnLeft" class="control-btn">◀</div>
                <div id="btnRight" class="control-btn">▶</div>
            </div>
            <div id="btnJump" class="control-btn" style="width: 80px; height: 80px; border-color: rgba(6, 182, 212, 0.5); background: rgba(6, 182, 212, 0.15); font-family: 'Orbitron', sans-serif; font-size: 12px; letter-spacing: 0.1em;">JUMP</div>
        </div>

        <div id="menuScreen" class="absolute inset-0 flex items-center justify-center interactive-ui z-30 p-3 overflow-y-auto">
            <div class="glass-panel p-6 md:p-10 rounded-3xl text-center w-full max-w-md relative flex flex-col items-center">
                <div class="ball-container mb-4 md:mb-6">
                    <div class="ball-glow"></div>
                    <canvas id="menuBallCanvas" width="180" height="180" style="position: relative; z-index: 2; width: 180px; height: 180px;"></canvas>
                </div>
                <div class="mb-6 md:mb-8 w-full">
                    <h1 class="neon-title text-4xl md:text-6xl mb-2 md:mb-3">SUPER BALL</h1>
                    <div class="decorative-line w-32 md:w-48 mx-auto mb-2 md:mb-3"></div>
                    <p class="subtitle text-[10px] md:text-xs font-light uppercase">Neon City Chronicles</p>
                </div>
                <div id="finalScoreContainer" class="hidden mb-4 md:mb-6 bg-gray-800/50 p-4 rounded-2xl border border-gray-700/50 w-full">
                    <p class="text-sm md:text-base text-gray-300 uppercase tracking-widest mb-1" id="levelCompleteText" style="font-family: 'Orbitron', sans-serif;">Level Complete!</p>
                    <p id="finalScore" class="text-3xl md:text-4xl text-yellow-400 font-bold" style="font-family: 'Orbitron', sans-serif;">$0</p>
                </div>
                <div class="w-full space-y-3 md:space-y-4">
                    <button id="playBtn" class="game-btn primary-btn w-full text-white font-black py-4 md:py-5 px-6 rounded-xl text-xl md:text-2xl uppercase tracking-widest border border-white/20">PLAY</button>
                    <div class="grid grid-cols-2 gap-2 md:gap-3">
                        <button id="storeBtnMenu" class="game-btn secondary-btn text-gray-300 font-semibold py-3 px-3 rounded-xl text-xs md:text-sm uppercase tracking-wider flex items-center justify-center gap-1.5">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-5 md:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
                            Store
                        </button>
                        <button id="settingsBtnMenu" class="game-btn secondary-btn text-gray-300 font-semibold py-3 px-3 rounded-xl text-xs md:text-sm uppercase tracking-wider flex items-center justify-center gap-1.5">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 md:h-5 md:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                            Settings
                        </button>
                    </div>
                </div>
                <div class="mt-4 md:mt-6 pt-4 border-t border-gray-700/40 w-full desktop-hint">
                    <div class="flex justify-center items-center gap-4 text-[10px] md:text-xs text-gray-500" style="font-family: 'Orbitron', sans-serif;">
                        <div class="flex items-center gap-1.5"><span class="px-2 py-1 bg-gray-800 rounded border border-gray-700">WASD</span> MOVE</div>
                        <div class="flex items-center gap-1.5"><span class="px-2 py-1 bg-gray-800 rounded border border-gray-700">SPACE</span> JUMP</div>
                    </div>
                </div>
            </div>
        </div>

        <div id="levelScreen" class="absolute inset-0 flex items-center justify-center bg-black/70 backdrop-blur-md interactive-ui z-30 hidden p-3">
            <div class="glass-panel p-4 md:p-6 rounded-2xl w-full max-w-5xl flex flex-col">
                <div class="flex justify-between items-center mb-4 md:mb-6 pb-3 border-b border-white/10">
                    <div class="min-w-0 flex-1 mr-2">
                        <h2 class="text-xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-300 to-pink-300 truncate" id="selectLevelText" style="font-family: 'Orbitron', sans-serif;">SELECT LEVEL</h2>
                        <p class="text-purple-200/60 text-xs md:text-sm mt-1">Completed: <span id="completedCount" class="text-green-400 font-bold">0</span>/10</p>
                    </div>
                    <button id="backToMenuFromLevels" class="text-gray-400 border border-gray-700 px-3 md:px-4 py-2 rounded-lg text-xs uppercase tracking-wider whitespace-nowrap" style="font-family: 'Orbitron', sans-serif; min-height: 36px;">Back</button>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-2 md:gap-3 overflow-y-auto pr-1 pb-2" style="max-height: calc(100dvh - 180px);" id="levelGrid"></div>
            </div>
        </div>

        <div id="storeScreen" class="absolute inset-0 flex items-center justify-center bg-black/70 backdrop-blur-md interactive-ui z-30 hidden p-3">
            <div class="glass-panel p-4 md:p-6 rounded-2xl w-full max-w-5xl flex flex-col">
                <div class="flex justify-between items-center mb-3 md:mb-4 pb-3 border-b border-white/10">
                    <div class="min-w-0 flex-1 mr-2">
                        <h2 class="text-xl md:text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 to-orange-300 truncate" id="storeTitle" style="font-family: 'Orbitron', sans-serif;">STORE</h2>
                        <p class="text-yellow-200/60 text-xs md:text-sm mt-1"><span id="balanceText">Balance</span>: <span class="text-yellow-400 font-bold">$<span id="storeBalance">0</span></span></p>
                    </div>
                    <button id="backToMenuFromStore" class="text-gray-400 border border-gray-700 px-3 md:px-4 py-2 rounded-lg text-xs uppercase tracking-wider whitespace-nowrap" style="font-family: 'Orbitron', sans-serif; min-height: 36px;">Back</button>
                </div>
                <div class="flex gap-1 md:gap-2 mb-3 pb-2 border-b border-white/10 overflow-x-auto">
                    <button class="tab-btn active px-3 py-1.5 rounded-lg border border-gray-700 text-[10px] md:text-xs uppercase tracking-wider text-gray-300 whitespace-nowrap" data-tab="colors">🎨 Colors</button>
                    <button class="tab-btn px-3 py-1.5 rounded-lg border border-gray-700 text-[10px] md:text-xs uppercase tracking-wider text-gray-300 whitespace-nowrap" data-tab="accessories">👒 Accessories</button>
                    <button class="tab-btn px-3 py-1.5 rounded-lg border border-gray-700 text-[10px] md:text-xs uppercase tracking-wider text-gray-300 whitespace-nowrap" data-tab="creatures">👾 Creatures</button>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2 md:gap-3 overflow-y-auto pr-1 pb-2" style="max-height: calc(100dvh - 220px);" id="storeGrid"></div>
            </div>
        </div>

        <div id="settingsModal" class="absolute inset-0 flex items-center justify-center bg-black/80 backdrop-blur-md interactive-ui z-40 hidden p-3">
            <div class="glass-panel p-5 md:p-6 rounded-2xl w-full max-w-md">
                <div class="flex justify-between items-center mb-5 pb-3 border-b border-white/10">
                    <h2 class="text-xl md:text-2xl font-bold text-purple-300" id="settingsTitle" style="font-family: 'Orbitron', sans-serif;">SETTINGS</h2>
                    <button id="closeSettings" class="text-gray-400 p-2 rounded-full" style="min-width: 40px; min-height: 40px;">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
                <div class="space-y-4">
                    <div class="bg-gray-800/50 p-3 rounded-xl border border-gray-700/50">
                        <label class="block text-gray-300 mb-2 text-xs font-bold uppercase tracking-wider" id="langLabel" style="font-family: 'Orbitron', sans-serif;">Language</label>
                        <select id="langSelect" class="w-full bg-gray-900 text-white border border-gray-600 rounded-lg p-2.5 text-sm focus:border-purple-500 outline-none" style="min-height: 44px;">
                            <option value="en">English</option>
                            <option value="es">Español</option>
                            <option value="fr">Français</option>
                            <option value="de">Deutsch</option>
                            <option value="jp">日本語</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-gray-800/50 p-3 rounded-xl border border-gray-700/50 flex justify-between items-center">
                            <span class="text-gray-300 text-xs font-bold" id="musicLabel">Music</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="musicToggle" class="sr-only peer" checked>
                                <div class="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-purple-600"></div>
                            </label>
                        </div>
                        <div class="bg-gray-800/50 p-3 rounded-xl border border-gray-700/50 flex justify-between items-center">
                            <span class="text-gray-300 text-xs font-bold" id="soundLabel">SFX</span>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" id="soundToggle" class="sr-only peer" checked>
                                <div class="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-purple-600"></div>
                            </label>
                        </div>
                    </div>
                    <div class="bg-gray-800/50 p-3 rounded-xl border border-gray-700/50">
                        <label class="block text-gray-300 mb-2 text-xs font-bold uppercase tracking-wider" id="moodLabel" style="font-family: 'Orbitron', sans-serif;">Default Mood</label>
                        <select id="moodSelect" class="w-full bg-gray-900 text-white border border-gray-600 rounded-lg p-2.5 text-sm focus:border-purple-500 outline-none" style="min-height: 44px;">
                            <option value="HAPPY">Happy 😊</option>
                            <option value="COOL">Cool 😎</option>
                            <option value="ANGRY">Angry 😠</option>
                            <option value="SAD">Sad 😢</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
